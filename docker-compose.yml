services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: text2sql_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-text2sql}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-text2sql_dev}
      POSTGRES_DB: ${POSTGRES_DB:-text2sql}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-text2sql}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
